<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>סורק מלאי יאמיט</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Heebo', sans-serif; background: #000; color: #1a2332; }

    /* ─── SETUP SCREEN ─────────────────────────────────── */
    #setupScreen {
      display: none; position: fixed; inset: 0; background: #f0f4f8;
      overflow-y: auto; z-index: 10;
      flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 32px 20px 40px;
    }
    #setupScreen.active { display: flex; }

    .setup-card {
      background: white; border-radius: 20px; padding: 32px 24px;
      width: 100%; max-width: 440px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .setup-icon  { text-align: center; font-size: 52px; margin-bottom: 16px; }
    .setup-title { text-align: center; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .setup-sub   { text-align: center; font-size: 14px; color: #6b7280; margin-bottom: 28px; }

    .field-label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
    .text-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid #d1d5db; border-radius: 10px;
      font-family: 'Heebo', sans-serif; font-size: 14px;
      outline: none; transition: border-color 0.2s;
      direction: ltr; text-align: left; background: white; color: #1a2332;
    }
    .text-input:focus { border-color: #00d4aa; }
    .text-input[dir="rtl"] { direction: rtl; text-align: right; }

    .btn {
      display: block; width: 100%; padding: 13px; margin-top: 10px;
      border-radius: 10px; font-family: 'Heebo', sans-serif; font-size: 15px;
      font-weight: 600; cursor: pointer; border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { opacity: 0.82; transform: scale(0.98); }
    .btn-primary   { background: #00d4aa; color: #0f2438; font-size: 16px; }
    .btn-secondary { background: #f9fafb; color: #374151; border: 1.5px dashed #d1d5db; }
    .btn-ghost     { background: #f3f4f6; color: #374151; }
    .btn-danger    { background: #fef2f2; color: #dc2626; border: 1.5px solid #fecaca; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0; color: #9ca3af; font-size: 13px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }

    .error-box {
      display: none; margin-top: 14px; padding: 11px 14px;
      background: #fef2f2; color: #dc2626;
      border: 1px solid #fecaca; border-radius: 10px; font-size: 14px;
    }
    .error-box.on { display: block; }

    /* ─── SCANNER SCREEN ───────────────────────────────── */
    #scannerScreen {
      display: none; position: fixed; inset: 0;
      background: #000; overflow: hidden;
    }
    #scannerScreen.active { display: block; }

    #video {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* Top bar */
    #scannerTopBar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      padding-top: max(14px, env(safe-area-inset-top, 14px));
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
      z-index: 20;
    }
    .scanner-logo { font-size: 16px; font-weight: 700; color: #00d4aa; }
    .scanner-logo span { color: rgba(255,255,255,0.55); font-weight: 400; font-size: 13px; }
    .top-actions { display: flex; gap: 8px; align-items: center; }
    .icon-btn {
      background: rgba(0,0,0,0.4); border: none; color: white;
      font-size: 20px; cursor: pointer; padding: 8px; border-radius: 10px;
      position: relative; line-height: 1;
    }
    .icon-btn:active { background: rgba(255,255,255,0.15); }
    .pending-badge {
      position: absolute; top: -4px; left: -4px;
      background: #dc2626; color: white; border-radius: 50%;
      width: 16px; height: 16px; font-size: 10px;
      display: flex; align-items: center; justify-content: center; font-weight: 700;
    }

    /* Viewfinder */
    #scannerFrame {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      pointer-events: none; z-index: 15;
    }
    .frame-box { width: 82vw; max-width: 340px; height: 32px; position: relative; }
    /* Horizontal beam */
    .frame-box::before {
      content: ''; position: absolute;
      left: 0; right: 0; top: 50%; height: 2px; transform: translateY(-50%);
      background: #00d4aa;
      box-shadow: 0 0 10px rgba(0,212,170,0.8);
      animation: beamPulse 1.6s ease-in-out infinite;
    }
    /* Left tick */
    .frame-box::after {
      content: ''; position: absolute;
      left: 0; top: 0; bottom: 0; width: 2px; background: #00d4aa;
    }
    /* Right tick */
    .frame-box > i { display: block; position: absolute; right: 0; top: 0; bottom: 0; width: 2px; background: #00d4aa; }
    .frame-box > i::before, .frame-box > i::after { display: none; }

    @keyframes beamPulse {
      0%, 100% { opacity: 0.5; box-shadow: 0 0 5px rgba(0,212,170,0.3); }
      50%       { opacity: 1;   box-shadow: 0 0 14px rgba(0,212,170,1); }
    }
    .scan-hint {
      color: rgba(255,255,255,0.65); font-size: 14px;
      margin-top: 22px; text-align: center;
    }
    .scan-status {
      display: flex; align-items: center; gap: 8px;
      margin-top: 14px; color: rgba(255,255,255,0.55); font-size: 13px;
    }
    .scan-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #00d4aa; flex-shrink: 0;
      animation: scanPulse 1.4s ease-in-out infinite;
    }
    @keyframes scanPulse { 0%,100%{opacity:0.25;transform:scale(0.9)} 50%{opacity:1;transform:scale(1.1)} }
    .scan-status.paused .scan-dot { animation: none; background: rgba(255,255,255,0.3); }
    .scan-status.paused { color: rgba(255,255,255,0.3); }

    @keyframes lineFlash {
      0%   { filter: brightness(4) drop-shadow(0 0 10px white); }
      100% { filter: none; }
    }
    .frame-box.flash { animation: lineFlash 0.4s ease forwards; }

    /* Result overlay */
    #resultOverlay {
      display: none; position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 25;
      background: linear-gradient(to top, rgba(0,0,0,0.97) 0%, rgba(0,0,0,0.88) 100%);
      padding: 24px 24px;
      padding-bottom: max(28px, env(safe-area-inset-bottom, 28px));
      animation: sheetUp 0.22s ease;
    }
    #resultOverlay.show { display: block; }

    .overlay-details {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .overlay-detail {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: rgba(255,255,255,0.5);
    }
    .overlay-detail .badge { font-size: 12px; }
    .overlay-price      { font-family: monospace; color: #fff; font-size: 14px; font-weight: 700; }
    .overlay-price-sale { font-family: monospace; color: #2dd4a8; font-size: 14px; font-weight: 700; }
    .overlay-price-was  { font-family: monospace; color: rgba(255,255,255,0.35); font-size: 12px; text-decoration: line-through; }

    /* ─── SEARCH OVERLAY ─────────────────────────────────── */
    #searchOverlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.97); z-index: 50;
      flex-direction: column;
    }
    #searchOverlay.open { display: flex; }
    #searchOverlayHeader {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      padding-top: max(14px, env(safe-area-inset-top, 14px));
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #searchOverlayInput {
      flex: 1; background: rgba(255,255,255,0.1);
      border: 1.5px solid rgba(255,255,255,0.15); border-radius: 10px;
      padding: 11px 14px; color: white; font-size: 16px;
      font-family: 'Heebo', sans-serif; outline: none; direction: rtl;
    }
    #searchOverlayInput::placeholder { color: rgba(255,255,255,0.3); }
    #searchOverlayResults { flex: 1; overflow-y: auto; }
    .so-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,0.07);
      cursor: pointer;
    }
    .so-row:active { background: rgba(255,255,255,0.07); }
    .so-name { font-size: 15px; font-weight: 600; color: white; margin-bottom: 3px; }
    .so-meta { font-size: 12px; color: rgba(255,255,255,0.4); font-family: monospace; }

    .overlay-barcode-label {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
      text-transform: uppercase; letter-spacing: 0.5px;
      font-family: monospace; margin-bottom: 4px;
    }
    .overlay-barcode-val {
      font-size: 13px; font-family: monospace; color: rgba(255,255,255,0.7);
      margin-bottom: 14px; word-break: break-all;
    }
    .overlay-status { font-size: 20px; font-weight: 700; margin-bottom: 20px; line-height: 1.3; }
    .overlay-status.found    { color: #00d4aa; }
    .overlay-status.notfound { color: #f59e0b; }
    .overlay-actions { display: flex; gap: 10px; }
    .overlay-btn {
      flex: 1; padding: 13px; border-radius: 12px;
      font-family: 'Heebo', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; border: none;
    }
    .overlay-btn-secondary {
      background: rgba(255,255,255,0.1); color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .overlay-btn-primary { background: #00d4aa; color: #0f2438; }

    /* ─── BOTTOM SHEETS ────────────────────────────────── */
    .sheet-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .sheet-backdrop.open { display: flex; }
    .sheet {
      background: white; border-radius: 20px 20px 0 0;
      padding: 8px 24px;
      padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
      width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto;
      animation: sheetUp 0.22s ease;
    }
    @keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    .handle {
      width: 40px; height: 4px; background: #d1d5db;
      border-radius: 2px; margin: 14px auto 20px;
    }

    /* Product sheet */
    .sheet-title  { font-size: 20px; font-weight: 700; margin-bottom: 16px; line-height: 1.3; }
    .res-row      { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #f3f4f6; }
    .res-row:last-of-type { border-bottom: none; }
    .res-lbl      { font-size: 13px; color: #6b7280; }
    .res-val      { font-size: 14px; font-weight: 600; font-family: monospace; color: #1a2332; }
    .modal-section { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; padding: 14px 0 6px; border-top: 1px solid #f3f4f6; margin-top: 4px; }
    .res-link     { color: #00d4aa; text-decoration: underline; cursor: pointer; font-size: 14px; font-weight: 600; word-break: break-all; }
    .price-regular { font-family: monospace; color: #1a2332; font-size: 13px; }
    .price-sale    { font-family: monospace; color: #16a34a; font-size: 13px; font-weight: 700; }
    .price-was     { font-family: monospace; color: #9ca3af; font-size: 12px; text-decoration: line-through; margin-left: 5px; }

    /* Badges */
    .badge      { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; }
    .badge-pos  { background: #dcfce7; color: #16a34a; }
    .badge-zero { background: #f3f4f6; color: #6b7280; }
    .badge-neg  { background: #fef2f2; color: #dc2626; }
    .bdot       { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .badge-pos  .bdot { background: #22c55e; }
    .badge-zero .bdot { background: #9ca3af; }
    .badge-neg  .bdot { background: #ef4444; }

    /* Link sheet */
    .link-sub     { font-size: 13px; color: #6b7280; margin-bottom: 16px; font-family: monospace; word-break: break-all; }
    .link-search-wrap { position: relative; margin-bottom: 12px; }
    .link-search-input {
      width: 100%; padding: 12px 14px 12px 40px;
      border: 1.5px solid #d1d5db; border-radius: 12px;
      font-family: 'Heebo', sans-serif; font-size: 15px;
      background: white; outline: none; color: #1a2332;
      direction: rtl; transition: border-color 0.2s;
    }
    .link-search-input:focus { border-color: #00d4aa; }
    .link-search-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); font-size: 16px; pointer-events: none; }
    .link-results { max-height: 280px; overflow-y: auto; margin-bottom: 12px; -webkit-overflow-scrolling: touch; }
    .link-product-row {
      padding: 12px 0; border-bottom: 1px solid #f3f4f6;
      cursor: pointer; display: flex; align-items: center; justify-content: space-between;
    }
    .link-product-row:active { background: #f9fafb; margin: 0 -8px; padding: 12px 8px; border-radius: 8px; }
    .link-product-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .link-product-sku  { font-size: 12px; color: #9ca3af; font-family: monospace; }
    .link-empty { text-align: center; padding: 32px 0; color: #9ca3af; font-size: 14px; }

    /* Link confirm panel */
    #linkConfirm {
      display: none; background: #f0fdf4; border: 1.5px solid #86efac;
      border-radius: 14px; padding: 16px 18px; margin-bottom: 14px;
      animation: sheetUp 0.18s ease;
    }
    #linkConfirm.show { display: block; }
    .lc-label { font-size: 11px; font-weight: 700; color: #15803d; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
    .lc-barcode { font-size: 12px; font-family: monospace; color: #6b7280; margin-bottom: 4px; }
    .lc-name    { font-size: 16px; font-weight: 700; color: #1a2332; margin-bottom: 16px; line-height: 1.3; }
    .lc-sku     { font-size: 12px; font-family: monospace; color: #9ca3af; }
    .lc-actions { display: flex; gap: 8px; }
    .lc-actions .btn { margin-top: 0; flex: 1; }

    /* Pending list in settings */
    #pendingList { margin-bottom: 10px; }
    .pending-empty { font-size: 13px; color: #9ca3af; padding: 8px 0; }
    .pending-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0; border-bottom: 1px solid #f3f4f6; gap: 10px;
    }
    .pending-row:last-child { border-bottom: none; }
    .pending-info { flex: 1; min-width: 0; }
    .pending-bc   { font-size: 12px; font-family: monospace; color: #374151; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pending-linked-name { font-size: 12px; color: #16a34a; margin-top: 2px; }
    .pending-linked-none { font-size: 12px; color: #9ca3af; margin-top: 2px; }
    .pending-acts { display: flex; gap: 5px; flex-shrink: 0; }
    .pact-btn {
      width: 30px; height: 30px; border: none; border-radius: 7px;
      cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center;
    }
    .pact-edit { background: #f0fdf4; color: #16a34a; }
    .pact-edit:active { background: #dcfce7; }
    .pact-del  { background: #fef2f2; color: #dc2626; }
    .pact-del:active  { background: #fee2e2; }

    /* Settings */
    .settings-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .section-lbl    { font-size: 11px; font-weight: 700; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; margin-top: 24px; }
    .scrape-count   { font-size: 12px; color: #16a34a; margin-top: 6px; }
    .gap8 { margin-bottom: 8px; }

    /* Loading */
    #loading { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.82); z-index: 400; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
    #loading.on { display: flex; }
    .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid #e5e7eb; border-top-color: #00d4aa; animation: spin 0.8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-txt { font-size: 14px; color: #6b7280; }

    /* Toast */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: #1a2332; color: white; padding: 12px 22px; border-radius: 50px;
      font-size: 14px; z-index: 500; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3); animation: toastIn 0.25s ease;
    }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(8px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

    #fileInput, #settingsFileInput { display: none; }
  </style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setupScreen">
  <div class="setup-card">
    <div class="setup-icon">&#128230;</div>
    <div class="setup-title">סורק מלאי יאמיט</div>
    <div class="setup-sub">טען נתוני מלאי כדי להתחיל</div>

    <label class="field-label" for="urlInput">קישור Google Sheets (פרסם כ-CSV)</label>
    <input class="text-input" id="urlInput" type="url"
      placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv">
    <button class="btn btn-primary" id="loadUrlBtn">טען מהקישור</button>

    <div class="divider">או</div>

    <button class="btn btn-secondary" id="uploadBtn">&#128194; העלה קובץ CSV מהמכשיר</button>
    <input type="file" id="fileInput" accept=".csv,.txt">

    <div class="error-box" id="setupError"></div>
  </div>
</div>

<!-- SCANNER SCREEN -->
<div id="scannerScreen">
  <video id="video" playsinline autoplay muted></video>

  <div id="scannerTopBar">
    <div class="scanner-logo">יאמיט <span>| סורק</span></div>
    <div class="top-actions">
      <button class="icon-btn" id="pendingBtn" style="display:none">
        &#128190;
        <span class="pending-badge" id="pendingCount"></span>
      </button>
      <button class="icon-btn" id="searchBtn">&#128269;</button>
      <button class="icon-btn" id="settingsBtn">&#9881;&#65039;</button>
    </div>
  </div>

  <div id="scannerFrame">
    <div class="frame-box" id="frameBox"><i></i></div>
    <div class="scan-hint">כוון את הברקוד לקו הסריקה</div>
    <div class="scan-status paused" id="scanStatus">
      <span class="scan-dot"></span>
      <span id="scanStatusText">מאתחל...</span>
    </div>
  </div>

  <div id="resultOverlay">
    <div class="overlay-barcode-label">ברקוד</div>
    <div class="overlay-barcode-val" id="overlayBarcodeVal"></div>
    <div class="overlay-status" id="overlayStatus"></div>
    <div class="overlay-details" id="overlayDetails"></div>
    <div class="overlay-actions">
      <button class="overlay-btn overlay-btn-secondary" id="overlayScanAgain">סרוק שוב</button>
      <button class="overlay-btn overlay-btn-primary"   id="overlayContinue">המשך</button>
    </div>
  </div>
</div>

<!-- SEARCH OVERLAY -->
<div id="searchOverlay">
  <div id="searchOverlayHeader">
    <input id="searchOverlayInput" type="text" placeholder='חפש מוצר, מק"ט...' autocomplete="off">
    <button class="icon-btn" id="searchOverlayClose">✕</button>
  </div>
  <div id="searchOverlayResults"></div>
</div>

<!-- PRODUCT SHEET (Step 4a) -->
<div class="sheet-backdrop" id="productSheetBackdrop">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title" id="productSheetName"></div>
    <div id="productSheetBody"></div>
    <button class="btn btn-primary" id="productSheetRescan" style="margin-top:18px">&#128247; סרוק שוב</button>
  </div>
</div>

<!-- LINK SHEET (Step 4b) -->
<div class="sheet-backdrop" id="linkSheetBackdrop">
  <div class="sheet">
    <div class="handle"></div>
    <div class="sheet-title">קשר ברקוד למוצר</div>
    <div class="link-sub" id="linkSheetBarcode"></div>

    <!-- Confirm panel (shown after tapping a product) -->
    <div id="linkConfirm">
      <div class="lc-label">לקשר?</div>
      <div class="lc-barcode" id="lcBarcode"></div>
      <div class="lc-name"    id="lcName"></div>
      <div class="lc-sku"     id="lcSku"></div>
      <div class="lc-actions">
        <button class="btn btn-primary"  id="lcConfirmBtn">&#10003; אישור</button>
        <button class="btn btn-ghost"    id="lcBackBtn">&#8592; חזור</button>
      </div>
    </div>

    <div class="link-search-wrap" id="linkSearchWrap">
      <span class="link-search-icon">&#128269;</span>
      <input class="link-search-input" id="linkSearchInput"
        type="search" placeholder="חפש מוצר לקישור..."
        autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="link-results" id="linkResults">
      <div class="link-empty">הקלד שם מוצר או מק&quot;ט לחיפוש</div>
    </div>
    <div id="linkFooter">

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
var LS_DATA        = 'yamit_data';
var LS_URL         = 'yamit_url';
var LS_COLS        = 'yamit_cols';
var LS_SCRAPE_URL  = 'yamit_scrape_url';
var LS_SCRAPE_DATA = 'yamit_scrape_data';
var LS_SCRAPE_COLS = 'yamit_scrape_cols';
var LS_PENDING     = 'yamit_pending';

var DEFAULT_COLS = { id: 'מספר פריט', name: 'שם פריט', alt: 'מספר חליפי', stock: 'כמות במלאי' };
var DEFAULT_SCRAPE_COLS = {
  sku: 'מק"ט', price: 'מחיר רגיל (₪)', salePrice: 'מחיר מבצע (₪)',
  stock: 'מלאי', feature1: 'תכונה 1', feature2: 'תכונה 2', url: 'URL מוצר'
};

// ── State ─────────────────────────────────────────────────────────────────────
var products        = [];
var cols            = Object.assign({}, DEFAULT_COLS);
var scrapeCols      = Object.assign({}, DEFAULT_SCRAPE_COLS);
var scrapeMap       = {};
var pendingBarcodes = [];

// Scanner state
var scanStream        = null;
var rafId             = null;
var zxingReader       = null;
var scanPaused        = false;
var currentBarcode    = null;
var currentProduct    = null;

// Link/edit state
var pendingLinkProduct = null;
var editPendingIndex   = null;

// ── DOM helpers ───────────────────────────────────────────────────────────────
function el(id) { return document.getElementById(id); }
var video     = el('video');
var loadingEl = el('loading');

// ── Boot ──────────────────────────────────────────────────────────────────────
(function boot() {
  var sc = localStorage.getItem(LS_COLS);
  if (sc) { try { cols = Object.assign({}, DEFAULT_COLS, JSON.parse(sc)); } catch(e) {} }

  var ssc = localStorage.getItem(LS_SCRAPE_COLS);
  if (ssc) { try { scrapeCols = Object.assign({}, DEFAULT_SCRAPE_COLS, JSON.parse(ssc)); } catch(e) {} }

  var savedScrape = localStorage.getItem(LS_SCRAPE_DATA);
  if (savedScrape) { try { buildScrapeMap(savedScrape); } catch(e) {} }

  var sp = localStorage.getItem(LS_PENDING);
  if (sp) { try { pendingBarcodes = JSON.parse(sp); } catch(e) {} }

  var savedData = localStorage.getItem(LS_DATA);
  if (savedData) {
    try {
      products = parseCSV(savedData);
      showScanner();
      updatePendingBadge();
      return;
    } catch(e) {}
  }
  showSetup();
  updatePendingBadge();
})();

// ── Screen switching ──────────────────────────────────────────────────────────
function showSetup() {
  el('setupScreen').classList.add('active');
  el('scannerScreen').classList.remove('active');
  el('urlInput').value = localStorage.getItem(LS_URL) || '';
  stopScanner();
}

function showScanner() {
  el('setupScreen').classList.remove('active');
  el('scannerScreen').classList.add('active');
  if (!scanStream) startScanner();
}

// ── CSV ───────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  var result = Papa.parse(text, { header: true, skipEmptyLines: true });
  return result.data.filter(function(row) {
    var name = String(row[cols.name] || '').trim();
    var id   = String(row[cols.id]   || '').trim();
    if (!name && !id) return false;
    if (/^\*+.*\*+$/.test(name)) return false;
    return true;
  });
}

function buildScrapeMap(text) {
  scrapeMap = {};
  var result = Papa.parse(text, { header: true, skipEmptyLines: true });
  result.data.forEach(function(row) {
    var sku = String(row[scrapeCols.sku] || '').trim();
    if (sku) scrapeMap[sku] = row;
  });
}

function updateScrapeCount() {
  var n = Object.keys(scrapeMap).length;
  var c = el('scrapeCount');
  if (!c) return;
  if (n > 0) { c.style.display = 'block'; c.textContent = '✓ נטענו ' + fmt(n) + ' פריטים מדוח המחירים'; }
  else { c.style.display = 'none'; }
}

// ── Data loading ──────────────────────────────────────────────────────────────
function setLoading(on) { loadingEl.classList.toggle('on', on); }
function showErr(msg)   { var e = el('setupError'); e.textContent = msg; e.classList.add('on'); }
function hideErr()      { el('setupError').classList.remove('on'); }

function loadUrl(url) {
  setLoading(true); hideErr();
  fetch(url)
    .then(function(r) { if (!r.ok) throw new Error('http'); return r.text(); })
    .then(function(text) {
      var rows = parseCSV(text);
      if (!rows.length) throw new Error('empty');
      products = rows;
      localStorage.setItem(LS_DATA, text);
      localStorage.setItem(LS_URL, url);
      showScanner();
      showToast('נטענו ' + fmt(products.length) + ' פריטים ✓');
    })
    .catch(function(e) {
      showErr(e.message === 'empty' ? 'לא נמצאו פריטים בקובץ' : 'שגיאה בטעינת הנתונים. נסה שוב.');
    })
    .finally(function() { setLoading(false); });
}

function loadFile(file) {
  setLoading(true); hideErr();
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var text = e.target.result;
      var rows = parseCSV(text);
      if (!rows.length) throw new Error('empty');
      products = rows;
      localStorage.setItem(LS_DATA, text);
      localStorage.removeItem(LS_URL);
      showScanner();
      showToast('נטענו ' + fmt(products.length) + ' פריטים ✓');
    } catch(err) { showErr('לא נמצאו פריטים בקובץ'); }
    finally { setLoading(false); }
  };
  reader.onerror = function() { showErr('שגיאה בקריאת הקובץ'); setLoading(false); };
  reader.readAsText(file, 'UTF-8');
}

function loadScrapeUrl(url) {
  setLoading(true);
  fetch(url)
    .then(function(r) { if (!r.ok) throw new Error(); return r.text(); })
    .then(function(text) {
      buildScrapeMap(text);
      localStorage.setItem(LS_SCRAPE_DATA, text);
      localStorage.setItem(LS_SCRAPE_URL, url);
      updateScrapeCount();
      showToast('נתוני מחירים נטענו ✓ (' + fmt(Object.keys(scrapeMap).length) + ' פריטים)');
    })
    .catch(function() { showToast('שגיאה בטעינת נתוני המחירים'); })
    .finally(function() { setLoading(false); });
}

// ── Setup events ──────────────────────────────────────────────────────────────
el('loadUrlBtn').addEventListener('click', function() {
  var url = el('urlInput').value.trim();
  if (!url) { showErr('יש להזין קישור'); return; }
  loadUrl(url);
});
el('uploadBtn').addEventListener('click', function() { el('fileInput').click(); });
el('fileInput').addEventListener('change', function(e) {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// ── Scanner core ──────────────────────────────────────────────────────────────
function startScanner() {
  var constraints = {
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
  };
  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      scanStream = stream;
      video.srcObject = stream;
      var p = video.play();
      if (p) p.catch(function() {});
      video.addEventListener('playing', function onPlay() {
        video.removeEventListener('playing', onPlay);
        scanPaused = false;
        setScanIndicator(true);
        if ('BarcodeDetector' in window) {
          startNativeLoop();
        } else {
          startZXingLoop();
        }
      });
    })
    .catch(function() {
      showToast('אין גישה למצלמה. אנא אשר הרשאה בהגדרות.');
    });
}

function makeStripCanvas() {
  var vw = video.videoWidth  || 1280;
  var vh = video.videoHeight || 720;
  var c = document.createElement('canvas');
  c.width  = vw;
  c.height = Math.max(1, Math.round(vh / 20));
  return c;
}

function drawStrip(canvas, ctx) {
  var sy = Math.round((video.videoHeight - canvas.height) / 2);
  ctx.drawImage(video, 0, sy, video.videoWidth, canvas.height, 0, 0, canvas.width, canvas.height);
}

function startNativeLoop() {
  var formats = ['ean_13','ean_8','upc_a','upc_e','code_128','code_39'];
  var det;
  try { det = new BarcodeDetector({ formats: formats }); }
  catch(e) { startZXingLoop(); return; }

  var stripCanvas = null;
  var ctx = null;
  var detecting = false;
  function loop() {
    if (scanPaused) { rafId = null; return; }
    rafId = requestAnimationFrame(loop);
    if (detecting || video.readyState < 2) return;
    if (!stripCanvas) { stripCanvas = makeStripCanvas(); ctx = stripCanvas.getContext('2d'); }
    drawStrip(stripCanvas, ctx);
    detecting = true;
    det.detect(stripCanvas)
      .then(function(codes) {
        detecting = false;
        if (!scanPaused && codes.length) onBarcodeDetected(codes[0].rawValue);
      })
      .catch(function() { detecting = false; });
  }
  rafId = requestAnimationFrame(loop);
}

function startZXingLoop() {
  try {
    if (zxingReader) { try { zxingReader.reset(); } catch(e) {} }
    zxingReader = new ZXing.BrowserMultiFormatReader(null, 50);
    var stripCanvas = null;
    var ctx = null;
    function zxingPoll() {
      if (scanPaused) return;
      if (video.readyState >= 2) {
        if (!stripCanvas) { stripCanvas = makeStripCanvas(); ctx = stripCanvas.getContext('2d'); }
        drawStrip(stripCanvas, ctx);
        try {
          var result = zxingReader.decodeFromCanvas(stripCanvas);
          if (result && !scanPaused) { onBarcodeDetected(result.getText()); return; }
        } catch(e) {}
      }
      setTimeout(zxingPoll, 50);
    }
    zxingPoll();
  } catch(e) {
    showToast('שגיאה בסורק ברקודים');
  }
}

function stopScanner() {
  scanPaused = true;
  setScanIndicator(false);
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  zxingReader = null;
  if (scanStream) {
    scanStream.getTracks().forEach(function(t) { t.stop(); });
    scanStream = null;
  }
  video.srcObject = null;
}

function resumeScanner() {
  el('resultOverlay').classList.remove('show');
  el('productSheetBackdrop').classList.remove('open');
  el('linkSheetBackdrop').classList.remove('open');
  currentBarcode     = null;
  currentProduct     = null;
  pendingLinkProduct = null;
  editPendingIndex   = null;
  scanPaused = false;
  setScanIndicator(true);
  if (!scanStream) { startScanner(); return; }
  if ('BarcodeDetector' in window) {
    startNativeLoop();
  } else {
    startZXingLoop();
  }
}

function onBarcodeDetected(val) {
  if (scanPaused) return;
  scanPaused = true;
  setScanIndicator(false);
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }

  // Flash frame corners
  var fb = el('frameBox');
  fb.classList.add('flash');
  setTimeout(function() { fb.classList.remove('flash'); }, 500);

  val = String(val).trim();
  currentBarcode = val;
  var match = products.find(function(p) { return String(p[cols.id]  || '').trim() === val; })
           || products.find(function(p) { return String(p[cols.alt] || '').trim() === val; });
  // Check previously linked barcodes
  if (!match) {
    var linked = pendingBarcodes.find(function(e) { return e.barcode === val && e.resolvedSku; });
    if (linked) {
      match = products.find(function(p) { return String(p[cols.id] || '').trim() === linked.resolvedSku; });
    }
  }
  currentProduct = match || null;
  showResultOverlay(val, match);
}

function setScanIndicator(active) {
  var s = el('scanStatus');
  var t = el('scanStatusText');
  if (!s) return;
  if (active) {
    s.classList.remove('paused');
    if (t) t.textContent = 'סורק...';
  } else {
    s.classList.add('paused');
    if (t) t.textContent = 'מושהה';
  }
}

// ── Result overlay ────────────────────────────────────────────────────────────
function showResultOverlay(barcode, product) {
  el('overlayBarcodeVal').textContent = barcode;
  var st = el('overlayStatus');
  st.className = 'overlay-status';
  var det = el('overlayDetails');
  det.textContent = '';
  if (product) {
    st.textContent = product[cols.name] || 'נמצא ✓';
    st.classList.add('found');
    var sku = String(product[cols.id] || '').trim();
    if (sku) {
      var skuEl = document.createElement('div'); skuEl.className = 'overlay-detail';
      skuEl.textContent = 'מק"ט: ' + sku;
      det.appendChild(skuEl);
    }
    var stockEl = document.createElement('div'); stockEl.className = 'overlay-detail';
    stockEl.textContent = 'מלאי: ';
    stockEl.appendChild(makeBadge(product[cols.stock]));
    det.appendChild(stockEl);
    var sd = sku ? scrapeMap[sku] : null;
    if (sd) {
      var reg  = String(sd[scrapeCols.price]     || '').trim();
      var sale = String(sd[scrapeCols.salePrice] || '').trim();
      if (!sale || sale === reg || sale === '0') sale = '';
      if (reg || sale) {
        var priceEl = document.createElement('div'); priceEl.className = 'overlay-detail';
        priceEl.textContent = 'מחיר: ';
        if (sale) {
          var sEl = document.createElement('span'); sEl.className = 'overlay-price-sale'; sEl.textContent = '₪' + sale;
          priceEl.appendChild(sEl);
          if (reg) { var wEl = document.createElement('span'); wEl.className = 'overlay-price-was'; wEl.textContent = '₪' + reg; priceEl.appendChild(wEl); }
        } else {
          var rEl = document.createElement('span'); rEl.className = 'overlay-price'; rEl.textContent = '₪' + reg;
          priceEl.appendChild(rEl);
        }
        det.appendChild(priceEl);
      }
    }
  } else {
    st.textContent = 'לא נמצא במלאי';
    st.classList.add('notfound');
  }
  el('resultOverlay').classList.add('show');
}

el('overlayScanAgain').addEventListener('click', resumeScanner);

el('overlayContinue').addEventListener('click', function() {
  el('resultOverlay').classList.remove('show');
  if (currentProduct) {
    showProductSheet(currentProduct);
  } else {
    showLinkSheet(currentBarcode);
  }
});

// ── Product sheet ─────────────────────────────────────────────────────────────
function showProductSheet(p) {
  var body = el('productSheetBody');
  body.textContent = '';
  el('productSheetName').textContent = p[cols.name] || '—';

  body.appendChild(makeRow('מספר פריט', p[cols.id] || '—'));
  if (p[cols.alt] && String(p[cols.alt]).trim()) {
    body.appendChild(makeRow('מספר חליפי', String(p[cols.alt]).trim()));
  }
  body.appendChild(makeRow('כמות במלאי', null, makeBadge(p[cols.stock])));

  var sd = scrapeMap[String(p[cols.id] || '').trim()];
  if (sd) {
    var sec = document.createElement('div');
    sec.className = 'modal-section';
    sec.textContent = 'נתוני אתר';
    body.appendChild(sec);

    var reg  = String(sd[scrapeCols.price]     || '').trim();
    var sale = String(sd[scrapeCols.salePrice]  || '').trim();
    if (sale && sale !== reg && sale !== '0') {
      var priceRow = document.createElement('div');
      priceRow.className = 'res-row';
      var lbl = document.createElement('span'); lbl.className = 'res-lbl'; lbl.textContent = 'מחיר';
      var vals = document.createElement('span');
      var sEl = document.createElement('span'); sEl.className = 'price-sale'; sEl.textContent = '₪' + sale;
      vals.appendChild(sEl);
      if (reg) { var wEl = document.createElement('span'); wEl.className = 'price-was'; wEl.textContent = '₪' + reg; vals.appendChild(wEl); }
      priceRow.appendChild(lbl); priceRow.appendChild(vals);
      body.appendChild(priceRow);
    } else if (reg) {
      body.appendChild(makeRow('מחיר', '₪' + reg));
    }

    var onlineStock = String(sd[scrapeCols.stock]    || '').trim();
    var f1          = String(sd[scrapeCols.feature1] || '').trim();
    var f2          = String(sd[scrapeCols.feature2] || '').trim();
    if (onlineStock) body.appendChild(makeRow('מלאי באתר', onlineStock));
    if (f1) body.appendChild(makeRow('תכונה 1', f1));
    if (f2) body.appendChild(makeRow('תכונה 2', f2));

    var productUrl = String(sd[scrapeCols.url] || '').trim();
    if (productUrl) {
      var urlRow = document.createElement('div'); urlRow.className = 'res-row';
      var ul = document.createElement('span'); ul.className = 'res-lbl'; ul.textContent = 'קישור מוצר';
      var a  = document.createElement('a');
      a.className = 'res-link'; a.textContent = 'פתח באתר ↗';
      a.href = productUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
      urlRow.appendChild(ul); urlRow.appendChild(a);
      body.appendChild(urlRow);
    }
  }

  el('productSheetBackdrop').classList.add('open');
}

el('productSheetRescan').addEventListener('click', resumeScanner);
el('productSheetBackdrop').addEventListener('click', function(e) {
  if (e.target === el('productSheetBackdrop')) resumeScanner();
});

// ── Link sheet ────────────────────────────────────────────────────────────────
var linkDebounce;

function showLinkSheet(barcode) {
  el('linkSheetBarcode').textContent = barcode;
  el('linkSearchInput').value = '';
  hideLinkConfirm();
  renderLinkEmpty('הקלד שם מוצר או מק"ט לחיפוש');
  el('linkSheetBackdrop').classList.add('open');
  setTimeout(function() { el('linkSearchInput').focus(); }, 300);
}

function hideLinkConfirm() {
  el('linkConfirm').classList.remove('show');
  el('linkSearchWrap').style.display = '';
  el('linkResults').style.display = '';
  el('linkFooter').style.display = '';
  pendingLinkProduct = null;
}

function showLinkConfirm(p) {
  pendingLinkProduct = p;
  el('lcBarcode').textContent = currentBarcode;
  el('lcName').textContent    = p[cols.name] || '—';
  el('lcSku').textContent     = p[cols.id]   || '';
  el('linkConfirm').classList.add('show');
  el('linkSearchWrap').style.display = 'none';
  el('linkResults').style.display    = 'none';
  el('linkFooter').style.display     = 'none';
}

el('lcConfirmBtn').addEventListener('click', function() {
  if (!pendingLinkProduct) return;
  var sku = String(pendingLinkProduct[cols.id] || '').trim();
  if (editPendingIndex !== null) {
    pendingBarcodes[editPendingIndex].resolvedSku = sku;
  } else {
    pendingBarcodes.push({ barcode: currentBarcode, timestamp: Date.now(), resolvedSku: sku });
  }
  savePendingBarcodes(); updatePendingBadge();
  showToast('ברקוד קושר ל-' + sku + ' ✓');
  resumeScanner();
});

el('lcBackBtn').addEventListener('click', hideLinkConfirm);

function renderLinkEmpty(msg) {
  var c = el('linkResults');
  c.textContent = '';
  var d = document.createElement('div');
  d.className = 'link-empty'; d.textContent = msg;
  c.appendChild(d);
}

el('linkSearchInput').addEventListener('input', function() {
  var q = el('linkSearchInput').value.trim();
  clearTimeout(linkDebounce);
  if (q.length < 2) { renderLinkEmpty('הקלד שם מוצר או מק"ט לחיפוש'); return; }
  linkDebounce = setTimeout(function() {
    var results = doSearch(q) || [];
    var c = el('linkResults');
    c.textContent = '';
    if (!results.length) { renderLinkEmpty('לא נמצאו מוצרים'); return; }
    results.slice(0, 20).forEach(function(p) {
      var row = document.createElement('div');
      row.className = 'link-product-row';
      var info = document.createElement('div');
      var nm = document.createElement('div'); nm.className = 'link-product-name'; nm.textContent = p[cols.name] || '—';
      var sk = document.createElement('div'); sk.className = 'link-product-sku';  sk.textContent = p[cols.id] || '';
      info.appendChild(nm); info.appendChild(sk);
      var chev = document.createElement('span');
      chev.textContent = '←'; chev.style.cssText = 'color:#9ca3af;font-size:16px;flex-shrink:0';
      row.appendChild(info); row.appendChild(chev);
      row.addEventListener('click', function() { showLinkConfirm(p); });
      c.appendChild(row);
    });
  }, 150);
});

el('linkSkipBtn').addEventListener('click', function() {
  if (currentBarcode) {
    if (!pendingBarcodes.some(function(e) { return e.barcode === currentBarcode; })) {
      pendingBarcodes.push({ barcode: currentBarcode, timestamp: Date.now(), resolvedSku: null });
      savePendingBarcodes(); updatePendingBadge();
      showToast('ברקוד נשמר לייצוא ✓');
    } else {
      showToast('ברקוד זה כבר ברשימה');
    }
  }
  resumeScanner();
});

el('linkCancelBtn').addEventListener('click', resumeScanner);
el('linkSheetBackdrop').addEventListener('click', function(e) {
  if (e.target === el('linkSheetBackdrop')) resumeScanner();
});

// ── Search ────────────────────────────────────────────────────────────────────
function doSearch(q) {
  if (!q || q.length < 2) return null;
  var lq = q.toLowerCase();
  return products.filter(function(p) {
    return norm(p[cols.id]).indexOf(lq) >= 0 ||
           norm(p[cols.name]).indexOf(lq) >= 0 ||
           norm(p[cols.alt]).indexOf(lq) >= 0;
  });
}

// ── Card helpers ──────────────────────────────────────────────────────────────
function makeBadge(qty) {
  var n = parseFloat(qty);
  var cls = isNaN(n) || n === 0 ? 'zero' : n > 0 ? 'pos' : 'neg';
  var label = isNaN(n) ? '—' : n.toLocaleString('he-IL');
  var span = document.createElement('span'); span.className = 'badge badge-' + cls;
  var dot  = document.createElement('span'); dot.className = 'bdot';
  span.appendChild(dot); span.appendChild(document.createTextNode(label));
  return span;
}

function makeRow(label, valueText, valueBadge) {
  var row = document.createElement('div'); row.className = 'res-row';
  var lbl = document.createElement('span'); lbl.className = 'res-lbl'; lbl.textContent = label;
  row.appendChild(lbl);
  if (valueBadge) {
    row.appendChild(valueBadge);
  } else {
    var val = document.createElement('span'); val.className = 'res-val'; val.textContent = valueText || '—';
    row.appendChild(val);
  }
  return row;
}

// ── Settings ──────────────────────────────────────────────────────────────────
el('pendingBtn').addEventListener('click', openSettings);
el('settingsBtn').addEventListener('click', openSettings);

function openSettings() {
  el('settingsUrl').value    = localStorage.getItem(LS_URL) || '';
  el('colId').value          = cols.id;
  el('colName').value        = cols.name;
  el('colAlt').value         = cols.alt;
  el('colStock').value       = cols.stock;
  el('scrapeUrlInput').value = localStorage.getItem(LS_SCRAPE_URL) || '';
  el('scColSku').value       = scrapeCols.sku;
  el('scColPrice').value     = scrapeCols.price;
  el('scColSalePrice').value = scrapeCols.salePrice;
  el('scColStock').value     = scrapeCols.stock;
  el('scColFeature1').value  = scrapeCols.feature1;
  el('scColFeature2').value  = scrapeCols.feature2;
  el('scColUrl').value       = scrapeCols.url;
  updateScrapeCount();
  renderPendingList();
  el('settingsModal').classList.add('open');
}

el('settingsClose').addEventListener('click', function() { el('settingsModal').classList.remove('open'); });
el('settingsModal').addEventListener('click', function(e) {
  if (e.target === el('settingsModal')) el('settingsModal').classList.remove('open');
});
el('settingsLoadUrl').addEventListener('click', function() {
  var url = el('settingsUrl').value.trim();
  if (!url) return;
  el('settingsModal').classList.remove('open');
  loadUrl(url);
});
el('settingsUploadBtn').addEventListener('click', function() { el('settingsFileInput').click(); });
el('settingsFileInput').addEventListener('change', function(e) {
  if (e.target.files[0]) { el('settingsModal').classList.remove('open'); loadFile(e.target.files[0]); e.target.value = ''; }
});
el('scrapeLoadUrlBtn').addEventListener('click', function() {
  var url = el('scrapeUrlInput').value.trim();
  if (!url) return;
  el('settingsModal').classList.remove('open');
  loadScrapeUrl(url);
});
el('saveScrapeColsBtn').addEventListener('click', function() {
  scrapeCols = {
    sku:       el('scColSku').value.trim()       || DEFAULT_SCRAPE_COLS.sku,
    price:     el('scColPrice').value.trim()     || DEFAULT_SCRAPE_COLS.price,
    salePrice: el('scColSalePrice').value.trim() || DEFAULT_SCRAPE_COLS.salePrice,
    stock:     el('scColStock').value.trim()     || DEFAULT_SCRAPE_COLS.stock,
    feature1:  el('scColFeature1').value.trim()  || DEFAULT_SCRAPE_COLS.feature1,
    feature2:  el('scColFeature2').value.trim()  || DEFAULT_SCRAPE_COLS.feature2,
    url:       el('scColUrl').value.trim()       || DEFAULT_SCRAPE_COLS.url
  };
  localStorage.setItem(LS_SCRAPE_COLS, JSON.stringify(scrapeCols));
  var saved = localStorage.getItem(LS_SCRAPE_DATA);
  if (saved) { try { buildScrapeMap(saved); } catch(e) {} }
  updateScrapeCount();
  el('settingsModal').classList.remove('open');
  showToast('מיפוי עמודות דוח מחירים נשמר ✓');
});
el('saveColsBtn').addEventListener('click', function() {
  cols = {
    id:    el('colId').value.trim()    || DEFAULT_COLS.id,
    name:  el('colName').value.trim()  || DEFAULT_COLS.name,
    alt:   el('colAlt').value.trim()   || DEFAULT_COLS.alt,
    stock: el('colStock').value.trim() || DEFAULT_COLS.stock
  };
  localStorage.setItem(LS_COLS, JSON.stringify(cols));
  var saved = localStorage.getItem(LS_DATA);
  if (saved) { try { products = parseCSV(saved); } catch(e) {} }
  el('settingsModal').classList.remove('open');
  showToast('מיפוי עמודות נשמר ✓');
});
el('clearDataBtn').addEventListener('click', function() {
  if (!confirm('למחוק את כל הנתונים השמורים ולהתחיל מחדש?')) return;
  [LS_DATA, LS_URL, LS_SCRAPE_DATA, LS_SCRAPE_URL].forEach(function(k) { localStorage.removeItem(k); });
  products = []; scrapeMap = {};
  el('settingsModal').classList.remove('open');
  stopScanner();
  showSetup();
});
el('exportPendingBtn').addEventListener('click', exportPendingCSV);

// ── Pending barcodes ──────────────────────────────────────────────────────────
function savePendingBarcodes() { localStorage.setItem(LS_PENDING, JSON.stringify(pendingBarcodes)); }

function renderPendingList() {
  var container = el('pendingList');
  if (!container) return;
  container.textContent = '';
  if (!pendingBarcodes.length) {
    var empty = document.createElement('div');
    empty.className = 'pending-empty';
    empty.textContent = 'אין ברקודים שמורים';
    container.appendChild(empty);
    return;
  }
  pendingBarcodes.forEach(function(entry, i) {
    var row  = document.createElement('div'); row.className = 'pending-row';
    var info = document.createElement('div'); info.className = 'pending-info';

    var bc = document.createElement('div'); bc.className = 'pending-bc';
    bc.textContent = entry.barcode;
    info.appendChild(bc);

    var linked = document.createElement('div');
    if (entry.resolvedSku) {
      linked.className = 'pending-linked-name';
      var prod = products.find(function(p) { return String(p[cols.id] || '').trim() === entry.resolvedSku; });
      linked.textContent = '→ ' + (prod ? prod[cols.name] : entry.resolvedSku);
    } else {
      linked.className = 'pending-linked-none';
      linked.textContent = 'ללא קישור';
    }
    info.appendChild(linked);
    row.appendChild(info);

    var acts = document.createElement('div'); acts.className = 'pending-acts';

    var editBtn = document.createElement('button');
    editBtn.className = 'pact-btn pact-edit'; editBtn.textContent = '✎'; editBtn.title = 'ערוך קישור';
    (function(idx) {
      editBtn.addEventListener('click', function() { editPendingBarcode(idx); });
    })(i);
    acts.appendChild(editBtn);

    var delBtn = document.createElement('button');
    delBtn.className = 'pact-btn pact-del'; delBtn.textContent = '✕'; delBtn.title = 'מחק';
    (function(idx) {
      delBtn.addEventListener('click', function() {
        pendingBarcodes.splice(idx, 1);
        savePendingBarcodes(); updatePendingBadge(); renderPendingList();
      });
    })(i);
    acts.appendChild(delBtn);

    row.appendChild(acts);
    container.appendChild(row);
  });
}

function editPendingBarcode(index) {
  editPendingIndex = index;
  currentBarcode   = pendingBarcodes[index].barcode;
  el('settingsModal').classList.remove('open');
  scanPaused = true;
  showLinkSheet(currentBarcode);
}

function updatePendingBadge() {
  var btn = el('pendingBtn');
  var unresolved = pendingBarcodes.filter(function(e) { return e.resolvedSku === null; });
  if (unresolved.length) {
    btn.style.display = '';
    el('pendingCount').textContent = unresolved.length;
  } else {
    btn.style.display = 'none';
  }
}

function exportPendingCSV() {
  if (!pendingBarcodes.length) { showToast('אין ברקודים בהמתנה'); return; }
  function q(v) { return '"' + String(v || '').replace(/"/g, '""') + '"'; }
  var rows = [['barcode','resolvedSku','timestamp']];
  pendingBarcodes.forEach(function(e) { rows.push([q(e.barcode), q(e.resolvedSku), q(e.timestamp)]); });
  var csv  = rows.map(function(r) { return r.join(','); }).join('\n');
  var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'pending-barcodes-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click(); URL.revokeObjectURL(url);
  if (confirm('ייצוא הושלם. לנקות את הרשימה?')) {
    pendingBarcodes = []; savePendingBarcodes(); updatePendingBadge();
  }
}

// ── Search overlay ────────────────────────────────────────────────────────────
var searchDebounce;

el('searchBtn').addEventListener('click', function() {
  scanPaused = true;
  setScanIndicator(false);
  el('searchOverlayInput').value = '';
  el('searchOverlayResults').textContent = '';
  el('searchOverlay').classList.add('open');
  setTimeout(function() { el('searchOverlayInput').focus(); }, 80);
});

el('searchOverlayClose').addEventListener('click', function() {
  el('searchOverlay').classList.remove('open');
  resumeScanner();
});

el('searchOverlayInput').addEventListener('input', function() {
  var q = el('searchOverlayInput').value.trim();
  clearTimeout(searchDebounce);
  var container = el('searchOverlayResults');
  if (q.length < 2) { container.textContent = ''; return; }
  searchDebounce = setTimeout(function() {
    var results = doSearch(q) || [];
    container.textContent = '';
    if (!results.length) {
      var empty = document.createElement('div');
      empty.style.cssText = 'padding:24px 16px;color:rgba(255,255,255,0.4);text-align:center;font-size:14px';
      empty.textContent = 'לא נמצאו מוצרים';
      container.appendChild(empty);
      return;
    }
    results.slice(0, 40).forEach(function(p) {
      var row = document.createElement('div');
      row.className = 'so-row';
      var info = document.createElement('div');
      var nm = document.createElement('div'); nm.className = 'so-name'; nm.textContent = p[cols.name] || '—';
      var meta = document.createElement('div'); meta.className = 'so-meta';
      meta.textContent = (p[cols.id] || '') + (p[cols.alt] ? '  •  ' + p[cols.alt] : '');
      info.appendChild(nm); info.appendChild(meta);
      var chev = document.createElement('span'); chev.textContent = '←';
      chev.style.cssText = 'color:rgba(255,255,255,0.25);font-size:16px;flex-shrink:0';
      row.appendChild(info); row.appendChild(chev);
      row.addEventListener('click', function() {
        el('searchOverlay').classList.remove('open');
        currentProduct = p;
        showProductSheet(p);
      });
      container.appendChild(row);
    });
  }, 150);
});

// ── Toast & utils ─────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}
function norm(v) { return String(v || '').toLowerCase(); }
function fmt(n)  { return Number(n).toLocaleString('he-IL'); }
</script>
